<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Επιβεβαίωσε το νέο email σου</title>
  </head>
  <body style="margin:0;background:#f5f7f4;font-family:Arial,Helvetica,sans-serif;color:#111827;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f5f7f4;padding:28px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border:1px solid #dfe7dd;border-radius:18px;overflow:hidden;">
            <tr>
              <td style="padding:28px;">
                <p style="margin:0 0 8px;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:#166534;font-weight:700;">NutriTail AI</p>
                <h1 style="margin:0 0 12px;font-size:26px;line-height:1.2;">Επιβεβαίωση νέου email</h1>
                <p style="margin:0 0 20px;font-size:16px;line-height:1.6;">Πάτησε το κουμπί για να επιβεβαιώσεις το νέο email: <strong>{{ .NewEmail }}</strong>.</p>
                <p style="margin:0 0 20px;">
                  <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#111111;color:#ffffff;text-decoration:none;border-radius:12px;padding:14px 22px;font-size:15px;font-weight:700;">Επιβεβαίωση νέου email</a>
                </p>
                <p style="margin:0;color:#4b5563;font-size:14px;line-height:1.6;">Αν δεν ζήτησες αυτή την αλλαγή, αγνόησε το email και έλεγξε τον λογαριασμό σου.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
